# Railway config-as-code for the `web` service (overrides dashboard per deploy).
# Postgres is a separate managed Railway service — no config here.
# Env vars / secrets are NOT set here (they'd be committed); set them on the service.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
